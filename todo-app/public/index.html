<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DO IT — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8ff00;
      --text: #f0f0f0;
      --muted: #555;
      --danger: #ff3b3b;
      --done: #333;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    .app { max-width: 700px; margin: 0 auto; padding: 60px 24px 120px; animation: fadeUp 0.5s ease both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header {
      border-bottom: 3px solid var(--accent);
      padding-bottom: 20px; margin-bottom: 40px;
      display: flex; justify-content: space-between; align-items: flex-end;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 14vw, 100px);
      line-height: 0.85; letter-spacing: -2px;
      color: var(--accent); text-shadow: 4px 4px 0 #000;
    }

    .header-meta { text-align: right; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; line-height: 2; }
    .header-meta span { display: block; color: var(--text); font-size: 13px; }
    .header-meta .db-badge {
      display: inline-block; background: #1a2a00; border: 1px solid var(--accent);
      color: var(--accent); font-size: 9px; padding: 2px 8px; letter-spacing: 2px;
      text-transform: uppercase; margin-top: 4px;
    }

    .input-row { display: flex; margin-bottom: 10px; border: 2px solid var(--border); transition: border-color 0.2s; }
    .input-row:focus-within { border-color: var(--accent); }

    #task-input {
      flex: 1; background: var(--surface); border: none; outline: none;
      padding: 16px 20px; font-family: 'DM Mono', monospace; font-size: 15px;
      color: var(--text); caret-color: var(--accent);
    }
    #task-input::placeholder { color: var(--muted); font-style: italic; }

    #add-btn {
      background: var(--accent); border: none; padding: 16px 24px;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px;
      color: #000; cursor: pointer; transition: background 0.15s, transform 0.1s;
    }
    #add-btn:hover  { background: #fff; }
    #add-btn:active { transform: scale(0.96); }
    #add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .priority-row { display: flex; gap: 6px; margin-bottom: 30px; align-items: center; }
    .priority-row label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-right: 6px; }

    .pri-opt {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase;
      letter-spacing: 2px; padding: 5px 12px; cursor: pointer; transition: all 0.15s;
    }
    .pri-opt.active.high { background: #ff3b3b22; border-color: var(--danger); color: var(--danger); }
    .pri-opt.active.med  { background: #ff9a0022; border-color: #ff9a00; color: #ff9a00; }
    .pri-opt.active.low  { background: #55555522; border-color: #666; color: #aaa; }

    .stats {
      font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;
    }
    .stats em { color: var(--accent); font-style: normal; }

    .clear-done {
      background: none; border: none; color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px;
      text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: color 0.15s;
    }
    .clear-done:hover { color: var(--danger); }

    .filters { display: flex; gap: 4px; margin-bottom: 30px; }
    .filter-btn {
      background: none; border: 1px solid var(--border); color: var(--muted);
      font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase;
      letter-spacing: 2px; padding: 6px 14px; cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover  { border-color: var(--text); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }

    .progress-wrap { height: 3px; background: var(--border); margin-bottom: 30px; }
    .progress-bar  { height: 100%; background: var(--accent); transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1); }

    #task-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }

    .empty {
      text-align: center; padding: 60px 0; color: var(--muted);
      font-size: 13px; letter-spacing: 2px; text-transform: uppercase;
      border: 2px dashed var(--border);
    }
    .empty span { display: block; font-family: 'Bebas Neue', sans-serif; font-size: 52px; color: var(--border); margin-bottom: 10px; }

    .task-item {
      display: flex; align-items: center; gap: 16px;
      background: var(--surface); padding: 14px 18px;
      border-left: 3px solid transparent;
      animation: slideIn 0.25s ease both;
      transition: background 0.15s, border-color 0.15s;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    .task-item:hover           { background: #1e1e1e; border-left-color: var(--accent); }
    .task-item.done            { border-left-color: var(--done); opacity: 0.5; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .checkbox {
      width: 20px; height: 20px; border: 2px solid var(--muted);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color 0.15s, background 0.15s;
    }
    .task-item.done .checkbox { background: var(--done); border-color: var(--done); }
    .checkbox::after { content: '✓'; font-size: 12px; color: var(--accent); opacity: 0; transition: opacity 0.15s; }
    .task-item.done .checkbox::after { opacity: 1; }

    .task-text { flex: 1; font-size: 14px; line-height: 1.5; word-break: break-word; }

    .priority { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; padding: 3px 7px; border: 1px solid; flex-shrink: 0; }
    .priority.high { color: var(--danger); border-color: var(--danger); }
    .priority.med  { color: #ff9a00;       border-color: #ff9a00; }
    .priority.low  { color: #555;          border-color: #333; }

    .delete-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px;
      flex-shrink: 0; opacity: 0; transition: opacity 0.15s, color 0.15s;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); }

    /* Toast */
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--accent); color: var(--accent);
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px; padding: 10px 22px;
      opacity: 0; transition: all 0.3s; pointer-events: none; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Loading shimmer */
    .shimmer {
      height: 52px; background: linear-gradient(90deg, var(--surface) 25%, #1e1e1e 50%, var(--surface) 75%);
      background-size: 200% 100%; animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    footer { margin-top: 60px; border-top: 1px solid var(--border); padding-top: 20px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 3px; text-align: center; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">DO<br>IT</div>
    <div class="header-meta">
      task manager
      <span id="date-display"></span>
      <span id="time-display"></span>
      <span class="db-badge">⬡ SQLite DB</span>
    </div>
  </header>

  <div class="input-row">
    <input id="task-input" type="text" placeholder="what needs to be done..." maxlength="200" />
    <button id="add-btn">ADD</button>
  </div>

  <div class="priority-row">
    <label>Priority:</label>
    <button class="pri-opt low active" data-p="low">Low</button>
    <button class="pri-opt med" data-p="med">Med</button>
    <button class="pri-opt high" data-p="high">High</button>
  </div>

  <div class="stats">
    <span><em id="remaining">0</em> remaining · <em id="total">0</em> total</span>
    <button class="clear-done" id="clear-done">Clear done</button>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <div class="filters">
    <button class="filter-btn active" data-f="all">All</button>
    <button class="filter-btn" data-f="active">Active</button>
    <button class="filter-btn" data-f="done">Done</button>
    <button class="filter-btn" data-f="high">🔴 High</button>
  </div>

  <ul id="task-list"></ul>

  <footer>DO IT — Powered by <a href="#">Flask + SQLite</a>. Data persists forever.</footer>
</div>

<div class="toast" id="toast"></div>

<script>
  let allTasks = [];
  let filter   = 'all';
  let priority = 'low';
  let loading  = false;

  // ── Clock ──────────────────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    document.getElementById('date-display').textContent =
      now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
    document.getElementById('time-display').textContent =
      now.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }
  updateClock(); setInterval(updateClock, 1000);

  // ── Toast ──────────────────────────────────────────────────────────────────
  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── API helpers ────────────────────────────────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    if (!res.ok) throw new Error(await res.text());
    return res.json();
  }

  
  async function loadTasks() {
    showShimmer();
    try {
      allTasks = await api('/api/tasks');
      render();
    } catch (e) {
      toast('⚠ Could not reach server');
    }
  }

  function showShimmer() {
    const list = document.getElementById('task-list');
    list.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const li = document.createElement('li');
      li.className = 'shimmer'; list.appendChild(li);
    }
  }

  const input  = document.getElementById('task-input');
  const addBtn = document.getElementById('add-btn');

  async function addTask() {
    const text = input.value.trim();
    if (!text || loading) return;
    loading = true; addBtn.disabled = true;
    try {
      const task = await api('/api/tasks', 'POST', { text, priority });
      allTasks.unshift(task);
      input.value = '';
      render();
      toast('✓ Task added');
    } catch (e) { toast('⚠ Failed to add task'); }
    finally { loading = false; addBtn.disabled = false; input.focus(); }
  }

  addBtn.addEventListener('click', addTask);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

  async function toggle(id) {
    const task = allTasks.find(t => t.id === id);
    if (!task) return;
    const updated = await api(`/api/tasks/${id}`, 'PATCH', { done: task.done ? 0 : 1 });
    Object.assign(task, updated);
    render();
  }

  async function deleteTask(id) {
    await api(`/api/tasks/${id}`, 'DELETE');
    allTasks = allTasks.filter(t => t.id !== id);
    render(); toast('✗ Task removed');
  }

  document.getElementById('clear-done').addEventListener('click', async () => {
    await api('/api/tasks/clear-done', 'DELETE');
    allTasks = allTasks.filter(t => !t.done);
    render(); toast('✓ Done tasks cleared');
  });

  document.querySelectorAll('.pri-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      priority = btn.dataset.p;
      document.querySelectorAll('.pri-opt').forEach(b => b.classList.remove('active','high','med','low'));
      btn.classList.add('active', priority);
    });
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  function getFiltered() {
    if (filter === 'active') return allTasks.filter(t => !t.done);
    if (filter === 'done')   return allTasks.filter(t => t.done);
    if (filter === 'high')   return allTasks.filter(t => t.priority === 'high');
    return allTasks;
  }

  function render() {
    const filtered  = getFiltered();
    const doneCount = allTasks.filter(t => t.done).length;
    const pct       = allTasks.length ? (doneCount / allTasks.length) * 100 : 0;

    document.getElementById('remaining').textContent   = allTasks.filter(t => !t.done).length;
    document.getElementById('total').textContent       = allTasks.length;
    document.getElementById('progress-bar').style.width = pct + '%';

    const list = document.getElementById('task-list');
    list.innerHTML = '';

    if (!filtered.length) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.innerHTML = '<span>✦</span>nothing here';
      list.appendChild(li); return;
    }

    filtered.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '');
      li.innerHTML = `
        <div class="checkbox"></div>
        <span class="task-text">${esc(task.text)}</span>
        <span class="priority ${task.priority}">${task.priority}</span>
        <button class="delete-btn" title="Delete">×</button>
      `;
      li.querySelector('.checkbox').addEventListener('click', () => toggle(task.id));
      li.querySelector('.delete-btn').addEventListener('click', () => deleteTask(task.id));
      list.appendChild(li);
    });
  }

  function esc(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }


  loadTasks();
</script>
</body>
</html>
